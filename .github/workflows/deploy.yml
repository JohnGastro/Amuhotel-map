name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Generate routes — reads existing routes.json, only fetches new shops
      - name: Generate routes
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: node Amu-lp-map/scripts/generate-routes.js

      # Commit updated routes.json back to repo (cache for next run)
      - name: Commit routes.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Amu-lp-map/public/data/routes.json
          git diff --cached --quiet || git commit -m "chore: update routes.json [skip ci]"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Amu-lp-map/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
